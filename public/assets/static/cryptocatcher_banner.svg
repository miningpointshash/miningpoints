<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07040f"/>
      <stop offset="1" stop-color="#020204"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ff00ff" stop-opacity="0.7"/>
      <stop offset="0.5" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#39ff14" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

